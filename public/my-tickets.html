<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Tickets | Samadhan</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    .ticket-card   { background: var(--color-surface-muted); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 1.5rem; }
    .ticket-grid   { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
    .ticket-field  { display: flex; flex-direction: column; gap: 0.25rem; }
    .field-label   { font-size: 0.75rem; font-weight: 700; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .field-value   { font-size: 0.9rem; color: var(--color-navy); font-weight: 600; }
    .ticket-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .severity-bar  { height: 4px; border-radius: 2px; background: var(--color-border); overflow: hidden; margin-top: 0.25rem; }
    .severity-fill { height: 100%; border-radius: 2px; }
    .note-item     { padding: 0.5rem 0.75rem; background: var(--color-bg); border-radius: 6px; border-left: 3px solid var(--color-navy); margin-bottom: 0.5rem; }
    .note-by       { font-size: 0.75rem; color: var(--color-text-muted); margin-top: 0.25rem; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <div style="font-size: 2rem;">🏛️</div>
        <div class="brand-text">
          <span class="brand-name">Samadhan</span>
          <span class="brand-sub">AI Citizen Helpline</span>
        </div>
      </a>
      <ul class="nav-links">
        <li><a href="/" class="nav-link">Home</a></li>
        <li><a href="/login" class="nav-link" id="nav-login">Login</a></li>
        <li><button class="btn btn-secondary" id="nav-logout" style="display:none;" onclick="logout()">Logout</button></li>
      </ul>
    </div>
  </div>
</nav>

<section class="section">
  <div class="container" style="max-width: 800px;">
    <div class="text-center mb-4">
      <span class="label">Citizen Portal</span>
      <h1>Track Your Ticket</h1>
      <p class="lead" id="page-lead">Login with your mobile number to view your complaint tickets, or search by Ticket ID.</p>
    </div>

    <!-- Search by Ticket ID (always visible) -->
    <div class="card mb-4">
      <div class="form-group" style="margin-bottom: 0;">
        <label class="label">Search by Ticket ID</label>
        <div style="display: flex; gap: 1rem;">
          <input type="text" id="ticketIdInput" placeholder="e.g. DMC-20260325-0001" style="flex: 1;">
          <button class="btn btn-primary" id="searchBtn">Search</button>
        </div>
      </div>
    </div>

    <!-- Loading -->
    <div id="loading" style="display:none;" class="text-center" style="padding: 2rem 0;">
      <p class="ui-text" style="color: var(--color-text-muted);">Loading…</p>
    </div>

    <!-- Error -->
    <div id="error-msg" style="display:none; background:#fef2f2; border:1px solid #fca5a5; color:#b91c1c; border-radius:var(--radius-md); padding:0.75rem 1rem; margin-bottom:1rem; font-size:0.9rem;"></div>

    <!-- Ticket list -->
    <div id="ticket-list" style="display: flex; flex-direction: column; gap: 1.5rem;"></div>

    <!-- Empty state -->
    <div id="empty-state" style="display:none;" class="text-center card">
      <p class="ui-text" style="color: var(--color-text-muted); padding: 2rem 0;">No tickets found.</p>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="container text-center">
    <p class="ui-text" style="color: rgba(255,255,255,0.5);">© 2026 Samadhan AI Citizen Helpline. Built for Delhi.</p>
  </div>
</footer>

<script>
(function () {
  'use strict';

  const ticketList  = document.getElementById('ticket-list');
  const emptyState  = document.getElementById('empty-state');
  const errorMsg    = document.getElementById('error-msg');
  const loadingEl   = document.getElementById('loading');
  const navLogin    = document.getElementById('nav-login');
  const navLogout   = document.getElementById('nav-logout');

  function showError(msg) { errorMsg.textContent = msg; errorMsg.style.display = 'block'; }
  function clearError()   { errorMsg.style.display = 'none'; }
  function setLoading(v)  { loadingEl.style.display = v ? 'block' : 'none'; }

  // ── Auth check ──────────────────────────────────────────────────────────────
  async function checkSession() {
    try {
      const res = await fetch('/api/auth/me');
      if (res.ok) {
        const { role } = await res.json();
        if (role === 'citizen') {
          navLogin.style.display  = 'none';
          navLogout.style.display = 'block';
          document.getElementById('page-lead').textContent = 'Showing all tickets linked to your mobile number.';
          loadMyTickets();
        } else if (role === 'admin') {
          window.location.href = '/tickets';
        }
      }
    } catch (_) {}
  }

  async function loadMyTickets() {
    setLoading(true);
    try {
      const res = await fetch('/api/my-tickets');
      if (res.status === 401) { setLoading(false); return; }
      if (!res.ok) throw new Error('Failed to load tickets');
      const tickets = await res.json();
      setLoading(false);
      renderTickets(tickets);
    } catch (err) {
      setLoading(false);
      showError(err.message);
    }
  }

  // ── Search by ticket ID ─────────────────────────────────────────────────────
  document.getElementById('searchBtn').addEventListener('click', searchTicket);
  document.getElementById('ticketIdInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') searchTicket();
  });

  async function searchTicket() {
    const id = document.getElementById('ticketIdInput').value.trim();
    if (!id) return;
    clearError();
    ticketList.innerHTML = '';
    emptyState.style.display = 'none';
    setLoading(true);

    try {
      const res = await fetch(`/api/ticket/${encodeURIComponent(id)}`);
      setLoading(false);
      if (res.status === 404) { emptyState.style.display = 'block'; return; }
      if (!res.ok) throw new Error('Failed to fetch ticket');
      const ticket = await res.json();
      renderTickets([ticket]);
    } catch (err) {
      setLoading(false);
      showError(err.message);
    }
  }

  // ── Render ───────────────────────────────────────────────────────────────────
  function renderTickets(tickets) {
    ticketList.innerHTML = '';
    if (!tickets || tickets.length === 0) {
      emptyState.style.display = 'block';
      return;
    }
    emptyState.style.display = 'none';
    tickets.forEach(t => ticketList.appendChild(buildCard(t)));
  }

  function buildCard(t) {
    const el       = document.createElement('div');
    el.className   = 'ticket-card';
    const severity = t.severityScore || 1;
    const sevColor = severity >= 8 ? '#ef4444' : severity >= 5 ? '#f59e0b' : '#22c55e';
    const sevPct   = (severity / 10) * 100;
    const uploadLink = t.uploadToken
      ? `<a href="/upload/${t.uploadToken}" class="ui-text" style="color:var(--color-navy);font-weight:700;text-decoration:underline;">📎 Upload Documents →</a>`
      : '';
    const notes = (t.notes || []).map(n => `
      <div class="note-item">
        <p class="ui-text" style="font-size:0.88rem;">${esc(n.text)}</p>
        <p class="note-by">${esc(n.by)} — ${new Date(n.at).toLocaleString('en-IN')}</p>
      </div>`).join('');

    el.innerHTML = `
      <div class="ticket-header">
        <span class="ui-text" style="font-weight:800;color:var(--color-navy);font-size:1.05rem;">${esc(t.id)}</span>
        <span class="badge ${t.status === 'Open' ? 'badge-pending' : 'badge-success'}">${esc(t.status)}</span>
      </div>
      <div class="ticket-grid">
        <div class="ticket-field">
          <span class="field-label">Name</span>
          <span class="field-value">${esc(t.name)}</span>
        </div>
        <div class="ticket-field">
          <span class="field-label">Date</span>
          <span class="field-value">${new Date(t.createdAt).toLocaleDateString('en-IN')}</span>
        </div>
        <div class="ticket-field" style="grid-column:span 2;">
          <span class="field-label">Complaint</span>
          <span class="field-value" style="font-weight:500;">${esc(t.complaint)}</span>
        </div>
        <div class="ticket-field" style="grid-column:span 2;">
          <span class="field-label">Severity — ${severity}/10</span>
          <div class="severity-bar"><div class="severity-fill" style="width:${sevPct}%;background:${sevColor};"></div></div>
        </div>
      </div>
      ${notes ? `<div style="margin-top:1rem;border-top:1px dashed var(--color-border);padding-top:1rem;"><p class="field-label mb-1">Official Updates</p>${notes}</div>` : ''}
      ${uploadLink ? `<div style="margin-top:1rem;padding-top:1rem;border-top:1px dashed var(--color-border);">${uploadLink}</div>` : ''}
    `;
    return el;
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function logout() {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location.href = '/login';
  }
  window.logout = logout;

  checkSession();
})();
</script>

</body>
</html>
