<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard | CallPilot AI</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    /* Dashboard specific refinements */
    .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .stat-card { padding: 1.5rem; background: white; border: 1px solid var(--color-border); border-radius: var(--radius-md); text-align: center; }
    .stat-value { font-size: 2.5rem; font-weight: 800; color: var(--color-navy); display: block; }
    .stat-label { font-family: var(--font-ui); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--color-text-muted); font-weight: 700; }
    
    .toolbar { display: flex; gap: 1rem; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; background: white; padding: 1rem; border-radius: var(--radius-md); border: 1px solid var(--color-border); }
    .search-input { flex: 1; min-width: 250px; }
    
    .sev-chip { padding: 2px 8px; border-radius: 4px; font-weight: 800; font-size: 0.75rem; color: white; }
    .sev-low { background: #22c55e; }
    .sev-mid { background: #f59e0b; }
    .sev-high { background: #ef4444; }
    
    .status-pill { padding: 4px 10px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
    .status-open { background: #fee2e2; color: #991b1b; }
    .status-in-progress { background: #fef3c7; color: #92400e; }
    .status-resolved { background: #dcfce7; color: #166534; }
    
    .action-link { font-family: var(--font-ui); font-size: 0.75rem; font-weight: 700; color: var(--color-navy); text-decoration: none; margin-right: 0.5rem; border: none; background: none; cursor: pointer; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--color-border); }
    .action-link:hover { background: var(--color-surface-muted); }
    
    .filter-btn { padding: 0.5rem 1rem; border-radius: 4px; border: 1px solid var(--color-border); background: white; font-family: var(--font-ui); font-size: 0.75rem; font-weight: 700; cursor: pointer; }
    .filter-btn.active { background: var(--color-navy); color: white; border-color: var(--color-navy); }
    
    .spinner { border: 3px solid rgba(0,0,0,.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: var(--color-navy); animation: spin 1s linear infinite; margin: 0 auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .group-row { background: #f9fafb; cursor: pointer; }
    .group-arrow { display: inline-block; transition: transform 0.2s; margin-right: 8px; font-size: 0.7rem; }
    .group-arrow.open { transform: rotate(90deg); }
    .sub-row { background: white; }
    .sub-row td:first-child { padding-left: 2rem; }
    .count-badge { background: var(--color-navy); color: white; padding: 1px 6px; border-radius: 10px; font-size: 0.65rem; margin-left: 5px; }
  </style>
</head>
<body style="background: #f4f6f9;">

<nav class="navbar">
  <div class="container">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <div style="font-size: 2rem;">📞</div>
        <div class="brand-text">
          <span class="brand-name">CallPilot AI</span>
          <span class="brand-sub">Admin Portal</span>
        </div>
      </a>
      <div class="flex-center" style="gap: 1.5rem;">
        <div class="status-item ui-text" style="color: var(--color-green-india);">
          <span class="live-dot"></span> LIVE
        </div>
        <a href="/" class="nav-link">Home</a>
        <button id="logoutBtn" class="btn btn-secondary" style="padding: 0.5rem 1rem;">Logout</button>
      </div>
    </div>
  </div>
</nav>

<main class="container" style="padding-top: 2rem; padding-bottom: 4rem;">
  
  <div class="dashboard-grid">
    <div class="stat-card"><span class="stat-value" id="statTotal">—</span><span class="stat-label">Total Tickets</span></div>
    <div class="stat-card"><span class="stat-value" id="statOpen">—</span><span class="stat-label">Open Issues</span></div>
    <div class="stat-card"><span class="stat-value" id="statFiles" style="color: var(--color-green-india);">—</span><span class="stat-label">Documents</span></div>
    <div class="stat-card"><span class="stat-value" id="statToday" style="color: var(--color-saffron);">—</span><span class="stat-label">New Today</span></div>
  </div>

  <div class="toolbar">
    <div style="position: relative; flex: 1;">
      <input type="text" id="searchInput" class="search-input" placeholder="Search by name, phone, ID or complaint..."/>
    </div>
    <div style="display: flex; gap: 0.5rem;">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="open">Open</button>
      <button class="filter-btn" data-filter="in-progress">In Progress</button>
      <button class="filter-btn" data-filter="resolved">Resolved</button>
    </div>
    <div style="display: flex; gap: 0.5rem; border-left: 1px solid var(--color-border); padding-left: 1rem;">
      <button class="filter-btn" id="groupBtn">Group Similar</button>
      <button class="filter-btn" id="sortSevBtn">Sort Severity ↓</button>
      <button class="btn btn-secondary" id="refreshBtn" style="padding: 0.5rem 1rem;">Refresh</button>
    </div>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Citizen</th>
          <th>Contact</th>
          <th>Complaint Description</th>
          <th>Sev</th>
          <th>Status</th>
          <th>Docs</th>
          <th>Date Filed</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="9" style="text-align:center;padding:4rem"><div class="spinner"></div></td></tr>
      </tbody>
    </table>
  </div>

  <div id="mobileCards" style="margin-top: 2rem; display: none;"></div>

</main>

<script>
(function () {
  let allTickets   = [];
  let activeFilter = 'all';
  let groupMode    = false;
  let sortBySev    = false;
  let expandedGroups = new Set();

  const tableBody   = document.getElementById('tableBody');
  const mobileCards = document.getElementById('mobileCards');
  const searchInput = document.getElementById('searchInput');
  const refreshBtn  = document.getElementById('refreshBtn');
  const groupBtn    = document.getElementById('groupBtn');
  const sortSevBtn  = document.getElementById('sortSevBtn');

  function sevChip(score) {
    const s = score || 0;
    const cls = s <= 3 ? 'sev-low' : s <= 6 ? 'sev-mid' : 'sev-high';
    return '<span class="sev-chip ' + cls + '">' + s + '</span>';
  }

  function normalizeWords(text) {
    return String(text || '').toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ').trim().split(' ').filter(Boolean);
  }

  function jaccardSim(a, b) {
    var setA = new Set(a), setB = new Set(b), inter = 0;
    setA.forEach(function(w) { if (setB.has(w)) inter++; });
    var union = setA.size + setB.size - inter;
    return union === 0 ? 0 : inter / union;
  }

  function isSimilar(t1, t2) {
    var w1 = normalizeWords(t1.complaint), w2 = normalizeWords(t2.complaint);
    var n1 = w1.join(' '), n2 = w2.join(' ');
    if (n1.includes(n2) || n2.includes(n1)) return true;
    return jaccardSim(w1, w2) >= 0.6;
  }

  function groupTickets(arr) {
    var sorted = arr.slice().sort(function(a, b) { return new Date(a.createdAt) - new Date(b.createdAt); });
    var groups = [];
    sorted.forEach(function(t) {
      var found = false;
      for (var i = 0; i < groups.length; i++) {
        if (isSimilar(groups[i].representative, t)) {
          groups[i].tickets.push(t);
          if ((t.severityScore || 0) > (groups[i].representative.severityScore || 0)) {
            groups[i].representative = t;
          }
          groups[i].count = groups[i].tickets.length;
          groups[i].aggregateSeverity = Math.min(10, (groups[i].representative.severityScore || 0) + groups[i].count - 1);
          found = true;
          break;
        }
      }
      if (!found) {
        groups.push({ representative: t, tickets: [t], count: 1, aggregateSeverity: t.severityScore || 0 });
      }
    });
    groups.sort(function(a, b) { return b.aggregateSeverity - a.aggregateSeverity; });
    return groups;
  }

  async function load() {
    try {
      const res = await fetch('/api/tickets');
      allTickets = await res.json();
      updateStats();
      render();
    } catch {
      tableBody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#ef4444;padding:4rem">Failed to synchronize with server</td></tr>';
    }
  }

  function updateStats() {
    const today = new Date().toISOString().slice(0, 10);
    document.getElementById('statTotal').textContent = allTickets.length;
    document.getElementById('statOpen').textContent  = allTickets.filter(t => t.status === 'open').length;
    document.getElementById('statFiles').textContent = allTickets.reduce((s, t) => s + (t.files?.length || 0), 0);
    document.getElementById('statToday').textContent = allTickets.filter(t => t.createdAt?.startsWith(today)).length;
  }

  function ticketRow(t, extraClass) {
    const date    = new Date(t.createdAt);
    const dateStr = date.toLocaleDateString('en-US', { day: '2-digit', month: 'short' });
    const statusClass = (t.status || 'open').replace(' ', '-');
    return '<tr class="' + (extraClass || '') + '">' +
      '<td style="font-weight:700; color:var(--color-navy);">' + esc(t.id) + '</td>' +
      '<td>' + esc(t.name) + '</td>' +
      '<td style="font-family:var(--font-ui); font-size:0.8rem;">' + esc(t.phone) + '</td>' +
      '<td><div style="max-width:300px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="' + esc(t.complaint) + '">' + esc(t.complaint) + '</div></td>' +
      '<td>' + sevChip(t.severityScore) + '</td>' +
      '<td><span class="status-pill status-' + statusClass + '">' + (t.status || 'open') + '</span></td>' +
      '<td>' + (t.files?.length ? '<span class="badge badge-success">📎 ' + t.files.length + '</span>' : '—') + '</td>' +
      '<td style="font-size:0.8rem;">' + dateStr + '</td>' +
      '<td>' +
        '<a class="action-link" href="/upload/' + (t.uploadToken || '') + '" target="_blank">View</a>' +
        (t.status === 'open' ? '<button class="action-link" style="color:var(--color-green-india);" data-action="status" data-id="' + t.id + '" data-status="in-progress">Start</button>' : '') +
        (t.status === 'in-progress' ? '<button class="action-link" style="color:var(--color-saffron);" data-action="status" data-id="' + t.id + '" data-status="resolved">Resolve</button>' : '') +
      '</td></tr>';
  }

  function render() {
    const q = searchInput.value.toLowerCase().trim();
    let list = allTickets.filter(t => {
      if (activeFilter !== 'all' && t.status !== activeFilter) return false;
      if (!q) return true;
      return (t.name + t.phone + t.complaint + t.id).toLowerCase().includes(q);
    });

    if (sortBySev && !groupMode) {
      list.sort(function(a, b) { return (b.severityScore || 0) - (a.severityScore || 0); });
    }

    if (!list.length) {
      tableBody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:4rem;color:var(--color-text-muted);">No records found matching your criteria</td></tr>';
      return;
    }

    if (groupMode) {
      renderGrouped(list);
    } else {
      tableBody.innerHTML = list.map(function(t) { return ticketRow(t, ''); }).join('');
    }
  }

  function renderGrouped(list) {
    var groups = groupTickets(list);
    var html = '';

    groups.forEach(function(g, gi) {
      var rep = g.representative;
      var isOpen = expandedGroups.has(gi);
      var statusClass = (rep.status || 'open').replace(' ', '-');

      html += '<tr class="group-row" data-group="' + gi + '">' +
        '<td><span class="group-arrow ' + (isOpen ? 'open' : '') + '">▶</span>' + esc(rep.id) + '</td>' +
        '<td>' + esc(rep.name) + '</td>' +
        '<td>' + esc(rep.phone) + '</td>' +
        '<td>' + esc(rep.complaint) + (g.count > 1 ? '<span class="count-badge">+' + (g.count-1) + ' similar</span>' : '') + '</td>' +
        '<td>' + sevChip(g.aggregateSeverity) + '</td>' +
        '<td><span class="status-pill status-' + statusClass + '">' + (rep.status || 'open') + '</span></td>' +
        '<td>' + (rep.files?.length ? '📎 ' + rep.files.length : '—') + '</td>' +
        '<td>' + new Date(rep.createdAt).toLocaleDateString('en-US') + '</td>' +
        '<td><button class="action-link" data-action="status" data-id="' + rep.id + '" data-status="in-progress">Update</button></td>' +
        '</tr>';

      if (isOpen && g.count > 1) {
        g.tickets.forEach(function(t) {
          if (t.id === rep.id) return;
          html += ticketRow(t, 'sub-row');
        });
      }
    });
    tableBody.innerHTML = html;
  }

  function esc(s) {
    return String(s || '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  searchInput.addEventListener('input', render);
  refreshBtn.addEventListener('click', load);

  document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      render();
    });
  });

  groupBtn.addEventListener('click', () => {
    groupMode = !groupMode;
    groupBtn.classList.toggle('active', groupMode);
    expandedGroups.clear();
    render();
  });

  sortSevBtn.addEventListener('click', () => {
    sortBySev = !sortBySev;
    sortSevBtn.classList.toggle('active', sortBySev);
    render();
  });

  document.addEventListener('click', (e) => {
    const row = e.target.closest('.group-row');
    if (row) {
      const gi = parseInt(row.dataset.group, 10);
      if (expandedGroups.has(gi)) expandedGroups.delete(gi); else expandedGroups.add(gi);
      render();
      return;
    }
  });

  fetch('/api/auth/me').then(r => { if (!r.ok) location.href = '/login?next=/tickets'; });
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/auth/logout', { method: 'POST' });
    location.href = '/login';
  });

  document.addEventListener('click', async (e) => {
    const btn = e.target.closest('[data-action="status"]');
    if (!btn) return;
    e.stopPropagation();
    const id     = btn.dataset.id;
    const status = btn.dataset.status;
    const note   = prompt('Update status for ' + id + ' (optional note):');
    await fetch('/api/admin/ticket/' + id + '/status', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: status, note: note || undefined }),
    });
    load();
  });

  load();
  setInterval(load, 15000);
})();
</script>
</body>
</html>
