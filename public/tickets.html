<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ticket Dashboard — DMC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }

    /* ── Header ── */
    .topbar {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #1f6feb, #388bfd);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .topbar-title { font-size: 16px; font-weight: 700; }
    .topbar-sub   { font-size: 12px; color: #8b949e; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }

    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600;
    }
    .badge-blue  { background: #1f6feb22; color: #388bfd; border: 1px solid #1f6feb44; }
    .badge-green { background: #2ea04322; color: #3fb950; border: 1px solid #2ea04344; }
    .badge-gray  { background: #30363d44; color: #8b949e; border: 1px solid #30363d; }

    .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #3fb950; box-shadow: 0 0 6px #3fb950;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Layout ── */
    .main { padding: 24px; max-width: 1100px; margin: 0 auto; }

    /* ── Stats row ── */
    .stats { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-card {
      flex: 1; min-width: 140px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 16px 20px;
    }
    .stat-value { font-size: 28px; font-weight: 700; color: #388bfd; }
    .stat-label { font-size: 13px; color: #8b949e; margin-top: 2px; }

    /* ── Search & filter ── */
    .toolbar {
      display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .search-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-wrap input {
      width: 100%;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 9px 12px 9px 36px;
      color: #e6edf3;
      font-size: 14px;
      outline: none;
    }
    .search-wrap input:focus { border-color: #388bfd; }
    .search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: #8b949e; font-size: 16px; pointer-events: none;
    }
    .filter-btn {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 9px 16px;
      color: #e6edf3;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .filter-btn:hover, .filter-btn.active { border-color: #388bfd; color: #388bfd; }
    .refresh-btn {
      background: #1f6feb;
      border: none;
      border-radius: 8px;
      padding: 9px 16px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .refresh-btn:hover { background: #388bfd; }

    /* ── Table ── */
    .table-wrap {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: #1c2128;
      border-bottom: 1px solid #30363d;
    }
    td {
      padding: 14px 16px;
      font-size: 14px;
      border-bottom: 1px solid #21262d;
      vertical-align: top;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1c2128; }

    .ticket-id-cell { font-weight: 700; color: #388bfd; white-space: nowrap; }
    .complaint-cell { color: #e6edf3; max-width: 260px; }
    .complaint-text { overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .name-cell { white-space: nowrap; }
    .phone-cell { color: #8b949e; white-space: nowrap; font-size: 13px; }
    .date-cell  { color: #8b949e; font-size: 12px; white-space: nowrap; }
    .files-cell { text-align: center; }
    .actions-cell { white-space: nowrap; }

    .status-pill {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-open     { background: #1f6feb22; color: #388bfd; border: 1px solid #1f6feb44; }
    .status-resolved { background: #2ea04322; color: #3fb950; border: 1px solid #2ea04344; }
    .status-closed   { background: #30363d44; color: #8b949e; border: 1px solid #30363d; }

    .action-link {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      background: #21262d;
      color: #8b949e;
      border: 1px solid #30363d;
      margin-right: 6px;
      transition: all 0.15s;
    }
    .action-link:hover { border-color: #388bfd; color: #388bfd; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #8b949e;
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .empty-sub { font-size: 13px; }

    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid #30363d; border-top-color: #388bfd;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 700px) {
      .stat-card { min-width: 100px; }
      th.hide-mobile, td.hide-mobile { display: none; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-icon">🏛️</div>
    <div>
      <div class="topbar-title">DMC Complaint Dashboard</div>
      <div class="topbar-sub">Delhi Municipal Corporation</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="live-dot"></div>
    <span style="font-size:13px;color:#8b949e">Live</span>
    <a href="/" style="color:#8b949e;font-size:13px;text-decoration:none;">← Back to Agent</a>
  </div>
</div>

<div class="main">

  <div class="stats" id="statsRow">
    <div class="stat-card"><div class="stat-value" id="statTotal">—</div><div class="stat-label">Total Tickets</div></div>
    <div class="stat-card"><div class="stat-value" id="statOpen" style="color:#388bfd">—</div><div class="stat-label">Open</div></div>
    <div class="stat-card"><div class="stat-value" id="statFiles" style="color:#3fb950">—</div><div class="stat-label">Files Uploaded</div></div>
    <div class="stat-card"><div class="stat-value" id="statToday" style="color:#d2a8ff">—</div><div class="stat-label">Today</div></div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search by name, phone, or complaint…"/>
    </div>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="open">Open</button>
    <button class="filter-btn" data-filter="resolved">Resolved</button>
    <button class="refresh-btn" id="refreshBtn">⟳ Refresh</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Ticket ID</th>
          <th>Name</th>
          <th class="hide-mobile">Phone</th>
          <th>Complaint</th>
          <th>Status</th>
          <th class="hide-mobile">Files</th>
          <th class="hide-mobile">Filed</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="8" style="text-align:center;padding:40px"><div class="spinner"></div></td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
(function () {
  let allTickets  = [];
  let activeFilter = 'all';

  const tableBody  = document.getElementById('tableBody');
  const searchInput = document.getElementById('searchInput');
  const refreshBtn  = document.getElementById('refreshBtn');

  async function load() {
    try {
      const res = await fetch('/api/tickets');
      allTickets = await res.json();
      updateStats();
      render();
    } catch {
      tableBody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#f85149;padding:40px">Failed to load tickets</td></tr>';
    }
  }

  function updateStats() {
    const today = new Date().toISOString().slice(0, 10);
    document.getElementById('statTotal').textContent = allTickets.length;
    document.getElementById('statOpen').textContent  = allTickets.filter(t => t.status === 'open').length;
    document.getElementById('statFiles').textContent = allTickets.reduce((s, t) => s + (t.files?.length || 0), 0);
    document.getElementById('statToday').textContent = allTickets.filter(t => t.createdAt?.startsWith(today)).length;
  }

  function render() {
    const q = searchInput.value.toLowerCase().trim();
    let list = allTickets.filter(t => {
      if (activeFilter !== 'all' && t.status !== activeFilter) return false;
      if (!q) return true;
      return (t.name + t.phone + t.complaint + t.id).toLowerCase().includes(q);
    });

    if (!list.length) {
      tableBody.innerHTML = `
        <tr><td colspan="8">
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <div class="empty-title">${allTickets.length === 0 ? 'No tickets yet' : 'No matching tickets'}</div>
            <div class="empty-sub">${allTickets.length === 0 ? 'Complaints filed via phone calls will appear here.' : 'Try a different search or filter.'}</div>
          </div>
        </td></tr>`;
      return;
    }

    tableBody.innerHTML = list.map(t => {
      const date   = new Date(t.createdAt);
      const dateStr = date.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
      const timeStr = date.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
      return `
        <tr>
          <td class="ticket-id-cell">${esc(t.id)}</td>
          <td class="name-cell">${esc(t.name)}</td>
          <td class="phone-cell hide-mobile">${esc(t.phone)}</td>
          <td class="complaint-cell"><div class="complaint-text" title="${esc(t.complaint)}">${esc(t.complaint)}</div></td>
          <td><span class="status-pill status-${t.status}">${t.status}</span></td>
          <td class="files-cell hide-mobile">${t.files?.length ? `<span class="badge badge-green">📎 ${t.files.length}</span>` : '<span style="color:#8b949e">—</span>'}</td>
          <td class="date-cell hide-mobile">${dateStr}<br>${timeStr}</td>
          <td class="actions-cell">
            <a class="action-link" href="/ticket/${t.id}/upload" target="_blank">📎 Upload</a>
          </td>
        </tr>`;
    }).join('');
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Events
  searchInput.addEventListener('input', render);
  refreshBtn.addEventListener('click', load);
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      render();
    });
  });

  // Auto-refresh every 10 seconds
  load();
  setInterval(load, 10000);
})();
</script>
</body>
</html>
