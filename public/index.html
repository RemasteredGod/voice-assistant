<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JARVIS — AI Voice Demo</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root {
      --bg: #040810;
      --surface: rgba(10,17,32,.85);
      --border: rgba(0,212,255,.15);
      --text: #c8e6f7;
      --dim: #4a7a9b;
      --blue: #00d4ff;
      --purple: #a855f7;
      --orange: #f97316;
      --green: #22c55e;
    }

    html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Courier New',monospace; overflow-x:hidden; }

    /* grid bg */
    body::before {
      content:''; position:fixed; inset:0; z-index:0;
      background-image: linear-gradient(rgba(0,212,255,.04) 1px,transparent 1px), linear-gradient(90deg,rgba(0,212,255,.04) 1px,transparent 1px);
      background-size:50px 50px; pointer-events:none;
    }

    .page { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem 1.5rem; gap:2rem; }

    /* header */
    .brand { text-align:center; }
    .brand-name { font-size:.7rem; letter-spacing:.5rem; color:var(--blue); margin-bottom:.4rem; }
    h1 { font-size:clamp(2rem,5vw,3rem); font-weight:900; letter-spacing:.3rem;
      background:linear-gradient(135deg,#fff 0%,var(--blue) 50%,#818cf8 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      filter:drop-shadow(0 0 20px rgba(0,212,255,.35)); }
    .tagline { font-size:.72rem; color:var(--dim); letter-spacing:.2rem; margin-top:.3rem; }

    /* orb */
    .orb-wrap { position:relative; width:220px; height:220px; display:flex; align-items:center; justify-content:center; cursor:pointer; }

    .ring { position:absolute; border-radius:50%; border:1px solid rgba(0,212,255,.15); }
    .r1 { width:210px; height:210px; animation:spin 8s linear infinite; }
    .r2 { width:180px; height:180px; animation:spin 5s linear infinite reverse; }
    .r3 { width:150px; height:150px; animation:spin 3s linear infinite; }

    .orb {
      width:120px; height:120px; border-radius:50%; position:relative;
      background:radial-gradient(circle at 35% 35%, #1a4a6b, #0a1a3e 60%, #040810);
      box-shadow:0 0 25px rgba(26,96,128,.5),0 0 60px rgba(26,96,128,.2);
      animation:breathe 3.5s ease-in-out infinite;
      transition:all .4s cubic-bezier(.4,0,.2,1);
    }
    .orb::after { content:''; position:absolute; top:18%; left:22%; width:28%; height:18%; border-radius:50%; background:rgba(255,255,255,.18); filter:blur(3px); }

    /* orb states */
    .orb.listening {
      background:radial-gradient(circle at 35% 35%,#38bdf8,#0284c7 45%,#1e3a8a 80%);
      box-shadow:0 0 40px rgba(56,189,248,.8),0 0 90px rgba(56,189,248,.4);
      animation:pulse 1s ease-in-out infinite;
    }
    .orb.listening ~ .r1,.orb.listening ~ .r2,.orb.listening ~ .r3 { border-color:rgba(56,189,248,.35); }
    .orb-wrap.listening .ring { border-color:rgba(56,189,248,.35); }

    .orb.thinking {
      background:radial-gradient(circle at 35% 35%,#c084fc,#7c3aed 45%,#3b0764 80%);
      box-shadow:0 0 40px rgba(168,85,247,.8),0 0 90px rgba(168,85,247,.4);
      animation:think 1.5s ease-in-out infinite;
    }
    .orb-wrap.thinking .ring { border-color:rgba(168,85,247,.35); }

    .orb.speaking {
      background:radial-gradient(circle at 35% 35%,#fdba74,#ea580c 40%,#7c2d12 80%);
      box-shadow:0 0 40px rgba(249,115,22,.8),0 0 90px rgba(249,115,22,.4);
      animation:wave .5s ease-in-out infinite alternate;
    }
    .orb-wrap.speaking .ring { border-color:rgba(249,115,22,.35); }

    @keyframes breathe { 0%,100%{transform:scale(1);opacity:.85} 50%{transform:scale(1.06);opacity:1} }
    @keyframes pulse   { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12);box-shadow:0 0 60px rgba(56,189,248,.9),0 0 130px rgba(56,189,248,.5)} }
    @keyframes think   { 0%{transform:rotate(0deg) scale(1)} 50%{transform:rotate(180deg) scale(1.05)} 100%{transform:rotate(360deg) scale(1)} }
    @keyframes wave    { from{transform:scale(1)} to{transform:scale(1.14);box-shadow:0 0 60px rgba(249,115,22,.95),0 0 120px rgba(249,115,22,.5)} }
    @keyframes spin    { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    /* state label */
    .state-pill {
      display:inline-flex; align-items:center; gap:.5rem;
      padding:.3rem .9rem; border:1px solid var(--border); border-radius:99px;
      background:rgba(10,17,32,.8); font-size:.68rem; letter-spacing:.2rem; text-transform:uppercase;
      transition:all .4s;
    }
    .dot { width:7px; height:7px; border-radius:50%; background:var(--dim); animation:blink 2s infinite; }
    .state-pill.listening { border-color:rgba(56,189,248,.4); color:#38bdf8; }
    .state-pill.listening .dot { background:#38bdf8; box-shadow:0 0 8px #38bdf8; }
    .state-pill.thinking  { border-color:rgba(168,85,247,.4); color:#c084fc; }
    .state-pill.thinking  .dot { background:#a855f7; box-shadow:0 0 8px #a855f7; }
    .state-pill.speaking  { border-color:rgba(249,115,22,.4); color:#fb923c; }
    .state-pill.speaking  .dot { background:#f97316; box-shadow:0 0 8px #f97316; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* tap hint */
    .tap-hint { font-size:.72rem; color:var(--dim); letter-spacing:.05rem; text-align:center; min-height:1rem; transition:color .3s; }
    .tap-hint.error { color:#f87171; }

    /* transcript */
    .transcript {
      width:100%; max-width:600px;
      background:var(--surface); border:1px solid var(--border); border-radius:14px;
      overflow:hidden;
    }
    .transcript-head {
      padding:.6rem 1rem; border-bottom:1px solid var(--border);
      font-size:.65rem; letter-spacing:.2rem; color:var(--dim);
      display:flex; align-items:center; gap:.5rem;
    }
    .live-dot { width:6px; height:6px; border-radius:50%; background:var(--dim); }
    .live-dot.on { background:var(--green); box-shadow:0 0 6px var(--green); animation:blink .8s infinite; }
    .msgs { padding:.75rem; min-height:160px; max-height:320px; overflow-y:auto; display:flex; flex-direction:column; gap:.6rem; }
    .msgs::-webkit-scrollbar{width:3px} .msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

    .msg { max-width:82%; padding:.55rem .9rem; border-radius:10px; font-size:.84rem; line-height:1.5; animation:msgIn .25s ease; }
    .msg-label { display:block; font-size:.6rem; letter-spacing:.1rem; text-transform:uppercase; margin-bottom:.2rem; opacity:.55; }
    .msg.user { align-self:flex-end; background:rgba(3,105,161,.35); border:1px solid rgba(56,189,248,.2); color:#bae6fd; border-bottom-right-radius:3px; }
    .msg.ai   { align-self:flex-start; background:rgba(109,40,217,.2); border:1px solid rgba(168,85,247,.2); color:#e9d5ff; border-bottom-left-radius:3px; }
    .empty { color:var(--dim); font-size:.8rem; text-align:center; padding:2.5rem 0; }
    @keyframes msgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    /* footer */
    .footer { font-size:.62rem; color:var(--dim); display:flex; gap:2rem; opacity:.6; }

    /* no-speech warning */
    .warning { font-size:.72rem; color:#fbbf24; text-align:center; padding:.5rem 1rem; background:rgba(251,191,36,.08); border:1px solid rgba(251,191,36,.2); border-radius:8px; max-width:500px; display:none; }
  </style>
</head>
<body>
<div class="page">

  <div class="brand">
    <div class="brand-name">● J · A · R · V · I · S ●</div>
    <h1>AI Voice Agent</h1>
    <p class="tagline">Tap the orb and speak</p>
  </div>

  <div class="orb-wrap" id="orbWrap">
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="ring r3"></div>
    <div class="orb" id="orb"></div>
  </div>

  <div class="state-pill" id="pill"><span class="dot"></span><span id="pillTxt">TAP TO START</span></div>

  <p class="tap-hint" id="hint">Click the orb to talk to Jarvis</p>

  <div class="warning" id="warning">
    Your browser doesn't support the Web Speech API.<br>
    Please use <strong>Chrome</strong> or <strong>Edge</strong>.
  </div>

  <div class="transcript">
    <div class="transcript-head">
      <span class="live-dot" id="liveDot"></span>
      LIVE TRANSCRIPT
    </div>
    <div class="msgs" id="msgs">
      <div class="empty" id="empty">Conversation will appear here…</div>
    </div>
  </div>

  <div class="footer">
    <span>Gemini 2.5 Flash</span>
    <span>Google STT · TTS</span>
    <span id="msgCnt">0 messages</span>
  </div>

</div>
<script src="/app.js"></script>
</body>
</html>
